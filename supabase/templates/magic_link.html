<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in to Cymatics Portal</title>
</head>
<body style="margin:0;padding:24px;font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#fafafa;line-height:1.5;">
  <h2 style="margin:0 0 16px;font-size:1.25rem;font-weight:600;">Cymatics Portal</h2>
  <p style="margin:0 0 12px;">Your one-time sign-in code is:</p>
  <p style="margin:16px 0;font-size:1.75rem;font-weight:700;letter-spacing:0.25em;">{{ .Token }}</p>
  <p style="margin:0 0 12px;color:rgba(250,250,250,0.75);font-size:0.875rem;">Enter this code in the app, or open the link below in the <strong>same browser</strong> you used to request it.</p>
  <p style="margin:16px 0 0;">
    <a href="{{ .ConfirmationURL }}" style="color:#93c5fd;text-decoration:underline;">Complete sign-in</a>
  </p>
</body>
</html>
