<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirm your Cymatics Portal account</title>
</head>
<body style="margin:0;padding:24px;font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#fafafa;line-height:1.5;">
  <h2 style="margin:0 0 16px;font-size:1.25rem;font-weight:600;">Confirm your email</h2>
  <p style="margin:0 0 12px;">Welcome to Cymatics Portal. Your confirmation code is:</p>
  <p style="margin:16px 0;font-size:1.75rem;font-weight:700;letter-spacing:0.25em;">{{ .Token }}</p>
  <p style="margin:0 0 12px;color:rgba(250,250,250,0.75);font-size:0.875rem;">Enter this code in the app, or confirm by opening the link below in the <strong>same browser</strong> you started from.</p>
  <p style="margin:16px 0 0;">
    <a href="{{ .ConfirmationURL }}" style="color:#93c5fd;text-decoration:underline;">Confirm email</a>
  </p>
</body>
</html>
