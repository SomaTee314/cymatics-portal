<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0a0014;
    font-family: 'Orbitron', monospace;
  }

  .container {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  /* Cymatics-style backdrop (no external asset — works offline & for Puppeteer). Optional: replace with public/images/fractal-bg.png */
  .fractal-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 45% at 42% 48%, rgba(85, 248, 255, 0.12) 0%, transparent 55%),
      radial-gradient(circle at 18% 28%, rgba(120, 80, 255, 0.22) 0%, transparent 38%),
      radial-gradient(circle at 82% 20%, rgba(0, 255, 200, 0.18) 0%, transparent 36%),
      radial-gradient(circle at 70% 85%, rgba(255, 120, 80, 0.08) 0%, transparent 42%),
      repeating-conic-gradient(
        from 2deg at 50% 50%,
        rgba(15, 25, 55, 0.35) 0deg 1.2deg,
        rgba(8, 4, 28, 0.45) 1.2deg 2.8deg,
        rgba(20, 12, 48, 0.35) 2.8deg 4deg
      ),
      linear-gradient(158deg, #030508 0%, #0a0014 32%, #140828 58%, #050810 100%);
    filter: saturate(1.4) contrast(1.15) brightness(1.05);
  }

  /* Cinematic vignette */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      ellipse 70% 65% at 45% 50%,
      transparent 30%,
      rgba(10, 0, 20, 0.5) 65%,
      rgba(10, 0, 20, 0.85) 100%
    );
  }

  /* Top gradient fade for text readability */
  .top-fade {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 180px;
    background: linear-gradient(
      to bottom,
      rgba(10, 0, 20, 0.7) 0%,
      rgba(10, 0, 20, 0.3) 50%,
      transparent 100%
    );
  }

  /* Bottom gradient for tagline */
  .bottom-fade {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 220px;
    background: linear-gradient(
      to top,
      rgba(10, 0, 20, 0.85) 0%,
      rgba(10, 0, 20, 0.5) 40%,
      transparent 100%
    );
  }

  /* Scan line overlay */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
  }

  /* Glow orb accent */
  .glow-orb {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    top: 50%;
    left: 42%;
    transform: translate(-50%, -50%);
    background: radial-gradient(
      circle,
      rgba(0, 255, 200, 0.08) 0%,
      rgba(100, 80, 255, 0.05) 40%,
      transparent 70%
    );
    filter: blur(40px);
    mix-blend-mode: screen;
  }

  /* Title block */
  .title-block {
    position: absolute;
    top: 38px;
    left: 56px;
    z-index: 10;
  }

  .title-main {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 62px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #fff;
    text-shadow:
      0 0 20px rgba(0, 255, 200, 0.6),
      0 0 60px rgba(0, 255, 200, 0.3),
      0 0 120px rgba(100, 80, 255, 0.2),
      2px 2px 0 rgba(0, 0, 0, 0.5);
    line-height: 1.1;
  }

  .title-sub {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 14px;
    text-transform: uppercase;
    color: rgba(0, 255, 200, 0.8);
    margin-top: 8px;
    text-shadow:
      0 0 15px rgba(0, 255, 200, 0.5),
      0 0 40px rgba(0, 255, 200, 0.2);
  }

  /* Accent line under title */
  .accent-line {
    width: 180px;
    height: 2px;
    margin-top: 16px;
    background: linear-gradient(
      to right,
      rgba(0, 255, 200, 0.9),
      rgba(100, 80, 255, 0.6),
      transparent
    );
    box-shadow: 0 0 12px rgba(0, 255, 200, 0.4);
  }

  /* Bottom tagline */
  .tagline-block {
    position: absolute;
    bottom: 36px;
    left: 56px;
    right: 56px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    z-index: 10;
  }

  .tagline {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 500;
    font-size: 20px;
    letter-spacing: 3px;
    color: rgba(255, 255, 255, 0.75);
    text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
  }

  .tagline span {
    color: rgba(0, 255, 200, 0.9);
    text-shadow: 0 0 10px rgba(0, 255, 200, 0.4);
  }

  /* Feature pills */
  .features {
    display: flex;
    gap: 12px;
  }

  .pill {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1px solid rgba(0, 255, 200, 0.3);
    border-radius: 20px;
    color: rgba(0, 255, 200, 0.85);
    background: rgba(0, 255, 200, 0.06);
    backdrop-filter: blur(4px);
    text-shadow: 0 0 8px rgba(0, 255, 200, 0.3);
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 30px;
    height: 30px;
    z-index: 10;
  }
  .corner-tl { top: 20px; left: 20px; border-top: 2px solid rgba(0,255,200,0.3); border-left: 2px solid rgba(0,255,200,0.3); }
  .corner-tr { top: 20px; right: 20px; border-top: 2px solid rgba(0,255,200,0.3); border-right: 2px solid rgba(0,255,200,0.3); }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid rgba(0,255,200,0.3); border-left: 2px solid rgba(0,255,200,0.3); }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid rgba(0,255,200,0.3); border-right: 2px solid rgba(0,255,200,0.3); }

  /* Sanskrit decorative element */
  .sanskrit {
    position: absolute;
    top: 50%;
    right: 60px;
    transform: translateY(-50%);
    font-size: 120px;
    color: rgba(255, 255, 255, 0.06);
    font-family: serif;
    text-shadow: 0 0 40px rgba(100, 80, 255, 0.1);
    z-index: 5;
    line-height: 1;
  }

  /* Film grain */
  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="fractal-bg"></div>
    <div class="vignette"></div>
    <div class="top-fade"></div>
    <div class="bottom-fade"></div>
    <div class="glow-orb"></div>
    <div class="scanlines"></div>
    <div class="grain"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="sanskrit">ॐ</div>

    <div class="title-block">
      <div class="title-main">CYMATICS<br>PORTAL</div>
      <div class="title-sub">Sound Made Visible</div>
      <div class="accent-line"></div>
    </div>

    <div class="tagline-block">
      <div class="tagline">Explore <span>Chladni patterns</span> · Solfeggio frequencies · Sacred geometry</div>
      <div class="features">
        <div class="pill">Three.js</div>
        <div class="pill">Web Audio</div>
        <div class="pill">Real-time</div>
      </div>
    </div>
  </div>
</body>
</html>
