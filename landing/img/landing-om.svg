<?xml version="1.0" encoding="UTF-8"?>
<!--
  OM geometry from Wikimedia Commons "Om_symbol.svg" (PD).
  Steady hollow neon rim + clockwise-traveling pulse along stroke (SMIL stroke-dashoffset).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 356 367" width="356" height="367">
  <style type="text/css"><![CDATA[
    @media (prefers-reduced-motion: reduce) {
      .om-outline-pulse { opacity: 0 !important; }
      .om-outline-pulse-animate { display: none; }
    }
  ]]></style>
  <defs>
    <linearGradient id="omPulseStroke" gradientUnits="userSpaceOnUse" x1="28" y1="8" x2="330" y2="360">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#c6ffff"/>
      <stop offset="1" stop-color="#00e0ff"/>
    </linearGradient>
    <filter id="omPulseGlow" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter
      id="neonOutlineOnly"
      x="-90%"
      y="-90%"
      width="280%"
      height="280%"
      color-interpolation-filters="sRGB"
    >
      <feMorphology in="SourceAlpha" operator="erode" radius="1.55" result="eroded"/>
      <feComposite in="SourceAlpha" in2="eroded" operator="out" result="rim"/>
      <feMorphology in="rim" operator="dilate" radius="0.5" result="rimThick"/>

      <feGaussianBlur in="rimThick" stdDeviation="16" result="bloomXl"/>
      <feFlood flood-color="#0066ff" flood-opacity="0.95" result="fxl"/>
      <feComposite in="fxl" in2="bloomXl" operator="in" result="glowXl"/>

      <feGaussianBlur in="rimThick" stdDeviation="11" result="bloomFar"/>
      <feFlood flood-color="#00eaff" flood-opacity="0.98" result="fFar"/>
      <feComposite in="fFar" in2="bloomFar" operator="in" result="glowFar"/>

      <feGaussianBlur in="rimThick" stdDeviation="5.5" result="bloomMid"/>
      <feFlood flood-color="#54ffff" flood-opacity="1" result="fMid"/>
      <feComposite in="fMid" in2="bloomMid" operator="in" result="glowMid"/>

      <feGaussianBlur in="rimThick" stdDeviation="1.85" result="bloomNear"/>
      <feFlood flood-color="#cbffff" flood-opacity="1" result="fNear"/>
      <feComposite in="fNear" in2="bloomNear" operator="in" result="glowNear"/>

      <feGaussianBlur in="rimThick" stdDeviation="0.55" result="bloomCore"/>
      <feFlood flood-color="#f5ffff" flood-opacity="1" result="fCore"/>
      <feComposite in="fCore" in2="bloomCore" operator="in" result="hotLine"/>

      <feMerge>
        <feMergeNode in="glowXl"/>
        <feMergeNode in="glowFar"/>
        <feMergeNode in="glowMid"/>
        <feMergeNode in="glowNear"/>
        <feMergeNode in="hotLine"/>
      </feMerge>
    </filter>
  </defs>

